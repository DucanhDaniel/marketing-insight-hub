version: 2

models:
  - name: stg_fb_campaign_daily
    description: >
      Staging model: Parse và làm sạch dữ liệu hiệu suất campaign Facebook theo ngày
      từ bảng raw (raw_fb_campaign_daily_report). Mỗi dòng là một cặp (campaign_id, date_start) duy nhất.
      Các trường action được flatten ra từ mảng JSON 'actions'.
    columns:
      - name: surrogate_key
        description: "Khóa tổng hợp: concat(campaign_id, '_', date_start)"
        tests:
          - not_null
          - unique
      - name: job_id
        description: "ID của ETL job đã tạo ra bản ghi này, dùng để trace lại lịch sử chạy"
        tests:
          - not_null
      - name: created_at
        description: "Thời điểm job ETL ghi dữ liệu vào hệ thống"
        tests:
          - not_null
      - name: account_id
        description: "ID tài khoản quảng cáo Facebook"
      - name: account_name
        description: "Tên tài khoản quảng cáo Facebook"
      - name: campaign_id
        description: "ID campaign Facebook"
      - name: campaign_name
        description: "Tên campaign Facebook"
      - name: date_start
        description: "Ngày bắt đầu khoảng báo cáo (kiểu Date)"
      - name: date_stop
        description: "Ngày kết thúc khoảng báo cáo (kiểu Date)"
      - name: spend
        description: "Tổng chi tiêu trong kỳ"
      - name: reach
        description: "Số người dùng duy nhất được tiếp cận"
      - name: impressions
        description: "Tổng số lần hiển thị quảng cáo"
      - name: cpc
        description: "Chi phí mỗi lượt click"
      - name: cpm
        description: "Chi phí trên 1000 lượt hiển thị"
      - name: ctr
        description: "Tỷ lệ click / hiển thị (%)"
      - name: clicks
        description: "Tổng số lượt click"
      - name: frequency
        description: "Số lần trung bình một người xem quảng cáo"
      - name: cost_per_unique_inline_link_click
        description: "Chi phí trung bình cho mỗi lượt click link duy nhất"
      - name: post_engagement_count
        description: "Tổng tương tác bài đăng (flatten từ actions[action_type=post_engagement])"
      - name: page_engagement
        description: "Tổng tương tác trang (flatten từ actions[action_type=page_engagement])"
      - name: onsite_conversion_messaging_welcome_message
        description: "Số lượt xem Welcome Message qua Messenger (flatten từ actions)"
      - name: comment_count
        description: "Số lượt bình luận (flatten từ actions[action_type=comment])"
      - name: video_view_count
        description: "Số lượt xem video (flatten từ actions[action_type=video_view])"
      - name: post_reaction_count
        description: "Số lượt reaction bài đăng (flatten từ actions[action_type=post_reaction])"

