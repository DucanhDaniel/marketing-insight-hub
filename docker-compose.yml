# version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: my-mongo-db
    restart: always
    ports:
      - "27018:27017" # Ánh xạ ra cổng 27018 ở máy thật
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: |
        mongosh --host localhost --port 27017 -u ${MONGO_ROOT_USER} -p ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --eval "quit(db.runCommand({ ping: 1 }).ok ? 0 : 1)"
      interval: 100s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: mongod --quiet
    labels:
      - "autoheal=true"

  # Dịch vụ Redis
  redis:
    image: redis:latest
    container_name: my-redis-server
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    labels:
      - "autoheal=true"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: nginx_gatekeeper
    restart: always
    ports:
      - "8011:8011" # Nhận request từ bên ngoài vào qua cổng 8011
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - api
    labels:
      - "autoheal=true"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8011/ || wget -q --spider http://localhost:8011/ || nginx -t || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dịch vụ FastAPI API
  api:
    build: .
    container_name: tiktok_api_server
    restart: always
    command: gunicorn -w 5 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:8011
    volumes:
      - .:/app # Đồng bộ code local vào container, thay đổi code là server tự reload
    expose:
      - "8011"
    env_file:
      - .env
    depends_on:
      - redis # Đảm bảo Redis khởi động trước API
    labels:
      - "autoheal=true"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8011/docs')\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dịch vụ Celery Worker
  worker:
    build: .
    container_name: celery_worker
    restart: always
    # command: celery -A celery_worker.celery_app worker -P gevent --loglevel=info
    command: celery -A workers.tasks_modular.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    labels:
      - "autoheal=true"
    healthcheck:
      test: [ "CMD", "celery", "-A", "workers.tasks_modular.celery_app", "inspect", "ping" ]
      interval: 45s
      timeout: 15s
      retries: 3

  # Dịch vụ ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-marketing_raw}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "localhost:8123/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "autoheal=true"

  superset-init:
    image: apache/superset:latest
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset_init
    depends_on:
      - redis
    volumes:
      - superset-home:/app/superset_home
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=sqlite:////app/superset_home/superset.db
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@localhost --password admin || true &&
        superset init
      "
    restart: "no"
    healthcheck:
      disable: true

  superset:
    image: apache/superset:latest
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset_app
    restart: always
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=sqlite:////app/superset_home/superset.db
    volumes:
      - superset-home:/app/superset_home
    depends_on:
      superset-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "autoheal=true"

  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@postgres/airflow}
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: version
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create -u airflow -f Admin -l Admin -r Admin -e admin@example.com -p airflow || true
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@postgres/airflow}
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./transform:/opt/airflow/transform
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@postgres/airflow}
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./transform:/opt/airflow/transform
    command: scheduler

volumes:
  mongo-data:
  redis-data:
  clickhouse-data:
  clickhouse-logs:
  superset-home:
  postgres-db-volume:


