<div class="dashboard-content">
    <div class="summary-cards">
        <div class="card">
            <div class="card-icon black"><i class="fab fa-tiktok"></i></div>
            <div class="card-info">
                <h3>Total TikTok Tasks</h3>
                <p id="tiktok-total-tasks">0</p>
            </div>
        </div>
        <div class="card">
            <div class="card-icon blue"><i class="fas fa-box-open"></i></div>
            <div class="card-info">
                <h3>Product Tasks</h3>
                <p id="tiktok-product-tasks">0</p>
            </div>
        </div>
        <div class="card">
            <div class="card-icon orange"><i class="fas fa-palette"></i></div>
            <div class="card-info">
                <h3>Creative Tasks</h3>
                <p id="tiktok-creative-tasks">0</p>
            </div>
        </div>
    </div>

    <div class="grid-row-3">
        <div class="chart-container">
            <h3>Task Type Breakdown (Product/Creative)</h3>
            <div class="chart-wrapper">
                <canvas id="tiktokTypeChart"></canvas>
            </div>
        </div>
        <div class="chart-container">
            <h3>Success Rate</h3>
            <div class="chart-wrapper">
                <canvas id="tiktokStatusChart"></canvas>
            </div>
        </div>
        <div class="chart-container">
            <h3>TikTok API Totals</h3>
            <div class="chart-wrapper" style="overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Endpoint</th>
                            <th>Count</th>
                        </tr>
                    </thead>
                    <tbody id="tiktok-api-totals-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="chart-section">
        <h3>TikTok API Timeline</h3>
        <div class="chart-wrapper-timeline">
            <canvas id="tiktokApiChart"></canvas>
        </div>
    </div>

    <div class="table-section">
        <h3>TikTok Recent Tasks</h3>
        <table>
            <thead>
                <tr>
                    <th>Job ID</th>
                    <th>Task Type</th>
                    <th>User Email</th>
                    <th>Status</th>
                    <th>Duration (s)</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="tiktok-tasks-body"></tbody>
        </table>
    </div>
</div>
