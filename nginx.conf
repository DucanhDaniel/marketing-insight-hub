events {}

http {
    server {
        listen 8011;

        # Add Docker internal DNS resolver with 30s cache
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream_api http://api:8011;

        # Protect Dashboard, API, Reports and Documentation
        location ~ ^/(dashboard|api|reports|docs|redoc) {
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static files (can be public or protected, usually fine to keep public for CSS/JS)
        location /static {
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default catch-all
        location / {
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}